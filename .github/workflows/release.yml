name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this release
        run: |
          awk '/^## \[/ && !/\[Unreleased\]/ { if (found) exit; found=1; next } found { print }' \
            CHANGELOG.md > release_notes.md

      - name: Build addon zip
        id: zip
        run: |
          ADDON="RCLootCouncil_PriorityLoot"
          ZIP="${ADDON}-${{ steps.ver.outputs.version }}.zip"
          mkdir -p "dist/${ADDON}"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.gitignore' \
            --exclude='dist/' \
            --exclude='*.gs' \
            --exclude='*.md' \
            . "dist/${ADDON}/"
          cd dist
          zip -r "../${ZIP}" "${ADDON}/"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.version }}"
          body_path: release_notes.md
          files: ${{ steps.zip.outputs.zip }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
