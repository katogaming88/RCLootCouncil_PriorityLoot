name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/review') && github.event.issue.pull_request)
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || '' }}

      - name: Checkout PR branch for manual runs
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_HEAD=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName -q '.headRefName')
          git fetch origin "$PR_HEAD"
          git checkout "$PR_HEAD"

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          BASE_REF=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json baseRefName -q '.baseRefName')
          git fetch origin "$BASE_REF"
          git diff origin/$BASE_REF...HEAD > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Review with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, subprocess, os, urllib.request

          # Read the diff file
          with open('pr_diff.txt', 'r', errors='replace') as f:
              diff = f.read()

          from datetime import date
          today = date.today().isoformat()

          prompt = f"""Today's date is {today}. You are a code reviewer. Review the following git diff and respond ONLY with a JSON object in this exact format, no other text:
          {{
            "summary": "Overall review summary here",
            "comments": [
              {{
                "path": "path/to/file.js",
                "line": 42,
                "body": "Your inline comment here"
              }}
            ]
          }}

          Only include comments for real issues (bugs, security problems, bad practices). Use the exact file paths and line numbers from the diff. Do not comment on correct dates or minor style nits.

          Diff:
          {diff}"""

          payload = json.dumps({
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )
          with urllib.request.urlopen(req) as resp:
              response = json.loads(resp.read())

          review_text = response["content"][0]["text"]
          # Strip markdown code fences if Claude wraps it
          review_text = review_text.strip().removeprefix("```json").removeprefix("```").removesuffix("```").strip()
          review = json.loads(review_text)

          summary = review.get("summary", "")
          comments = review.get("comments", [])

          # Get commit SHA
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          gh = subprocess.check_output(
              ["gh", "pr", "view", pr_number, "--repo", repo, "--json", "headRefOid", "-q", ".headRefOid"],
              text=True
          ).strip()

          # Post review
          review_payload = json.dumps({
              "commit_id": gh,
              "body": f"## 🤖 Claude Code Review\n\n{summary}",
              "event": "COMMENT",
              "comments": [
                  {"path": c["path"], "line": c["line"], "body": c["body"], "side": "RIGHT"}
                  for c in comments
              ]
          }).encode()

          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls/{pr_number}/reviews",
              data=review_payload,
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json"
              },
              method="POST"
          )
          with urllib.request.urlopen(req2) as resp:
              result = json.loads(resp.read())
              print(f"Review posted: {result.get('html_url', 'no URL')}")
          EOF